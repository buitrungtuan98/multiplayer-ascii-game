name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 8

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Tests (Bun)
      run: pnpm test
    - name: Run E2E Tests (Playwright)\n      run: cd apps/web-portal && pnpm exec playwright install --with-deps && pnpm exec playwright test

    - name: Build Monorepo (Turborepo)
      run: pnpm run build
