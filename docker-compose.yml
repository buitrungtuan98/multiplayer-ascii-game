version: '3.8'

networks:
  game-internal-net:
    driver: bridge

services:
  cf-tunnel-1:
    image: cloudflare/cloudflared:latest
    container_name: cf-tunnel-1
    cpuset: "0,1"
    restart: always
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN_1}
    command: tunnel --no-autoupdate run
    networks:
      - game-internal-net
    depends_on:
      - nginx-gateway

  cf-tunnel-2:
    image: cloudflare/cloudflared:latest
    container_name: cf-tunnel-2
    cpuset: "2,3"
    restart: always
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN_2}
    command: tunnel --no-autoupdate run
    networks:
      - game-internal-net
    depends_on:
      - nginx-gateway

  nginx-gateway:
    image: nginx:alpine
    container_name: nginx-gateway
    cpuset: "1"
    restart: always
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - game-internal-net
    depends_on:
      - home-app
      - game-worker-1
      - game-worker-2
      - game-worker-3
      - game-worker-4

  home-app:
    image: ascii-game-home:latest
    container_name: ascii-home
    cpuset: "1"
    restart: always
    networks:
      - game-internal-net

  game-worker-1:
    image: ascii-game-server:latest
    container_name: ascii-game-worker-1
    cpuset: "2"
    restart: always
    environment:
      - WORKER_PORT=8081
      - REDIS_URL=redis://redis-state-engine:6379
    networks:
      - game-internal-net
    depends_on:
      - redis-state-engine

  game-worker-2:
    image: ascii-game-server:latest
    container_name: ascii-game-worker-2
    cpuset: "3"
    restart: always
    environment:
      - WORKER_PORT=8082
      - REDIS_URL=redis://redis-state-engine:6379
    networks:
      - game-internal-net
    depends_on:
      - redis-state-engine

  game-worker-3:
    image: ascii-game-server:latest
    container_name: ascii-game-worker-3
    cpuset: "2"
    restart: always
    environment:
      - WORKER_PORT=8083
      - REDIS_URL=redis://redis-state-engine:6379
    networks:
      - game-internal-net
    depends_on:
      - redis-state-engine

  game-worker-4:
    image: ascii-game-server:latest
    container_name: ascii-game-worker-4
    cpuset: "3"
    restart: always
    environment:
      - WORKER_PORT=8084
      - REDIS_URL=redis://redis-state-engine:6379
    networks:
      - game-internal-net
    depends_on:
      - redis-state-engine

  redis-state-engine:
    image: redis:alpine
    container_name: redis-state
    cpuset: "0"
    restart: always
    command: redis-server --save "" --appendonly no
    networks:
      - game-internal-net
  # Game Lobby Server
  game-lobby:
    image: ascii-game-lobby:latest
    container_name: game-lobby
    cpuset: "1"
    restart: always
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis-state-engine:6379
    networks:
      - game-internal-net
    depends_on:
      - redis-state-engine
