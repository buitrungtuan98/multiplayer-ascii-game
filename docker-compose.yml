version: '3.8'

networks:
  game-internal-net:
    driver: bridge # Mạng nội bộ khép kín hoàn toàn, không publish port ra ngoài máy chủ Host để tránh quét cổng

services:
  # Cloudflare Tunnel 1 - Trực tiếp định tuyến dữ liệu & ẩn giấu IP của VPS (Chạy trên Core 0, 1)
  cf-tunnel-1:
    image: cloudflare/cloudflared:latest
    container_name: cf-tunnel-1
    cpuset: "0,1"
    restart: always
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN_1}
    command: tunnel --no-autoupdate run
    networks:
      - game-internal-net
    depends_on:
      - nginx-gateway

  # Cloudflare Tunnel 2 - Load Balancing tăng tốc truy cập (Chạy trên Core 2, 3)
  cf-tunnel-2:
    image: cloudflare/cloudflared:latest
    container_name: cf-tunnel-2
    cpuset: "2,3"
    restart: always
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN_2}
    command: tunnel --no-autoupdate run
    networks:
      - game-internal-net
    depends_on:
      - nginx-gateway

  # Nginx Gateway - Định tuyến giao tiếp & quản lý kết nối SSL/WSS nội bộ
  nginx-gateway:
    image: nginx:alpine
    container_name: nginx-gateway
    cpuset: "1" # Chia sẻ core 1 với Next.js App
    restart: always
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - game-internal-net
    depends_on:
      - home-app
      - game-worker-1
      - game-worker-2
      - game-worker-3

  # Next.js Landing Page & Web Portal (Chỉ định chạy ở Core 1)
  home-app:
    image: ascii-game-home:latest
    container_name: ascii-home
    cpuset: "1"
    restart: always
    networks:
      - game-internal-net

  # Bun Game Worker 1 (UNO) - (Chỉ định chạy độc quyền ở Core 2)
  game-worker-1:
    image: ascii-game-server:latest
    container_name: ascii-game-worker-1
    cpuset: "2"
    restart: always
    environment:
      - WORKER_PORT=8081
      - REDIS_URL=redis://redis-state-engine:6379
    networks:
      - game-internal-net
    depends_on:
      - redis-state-engine

  # Bun Game Worker 2 (ZOMBIE) - (Chỉ định chạy độc quyền ở Core 3)
  game-worker-2:
    image: ascii-game-server:latest
    container_name: ascii-game-worker-2
    cpuset: "3"
    restart: always
    environment:
      - WORKER_PORT=8082
      - REDIS_URL=redis://redis-state-engine:6379
    networks:
      - game-internal-net
    depends_on:
      - redis-state-engine

  # Bun Game Worker 3 (AoE) - (Chia sẻ Core 2)
  game-worker-3:
    image: ascii-game-server:latest
    container_name: ascii-game-worker-3
    cpuset: "2"
    restart: always
    environment:
      - WORKER_PORT=8083
      - REDIS_URL=redis://redis-state-engine:6379
    networks:
      - game-internal-net
    depends_on:
      - redis-state-engine

  # Redis Engine - In-Memory State Cache (Chỉ định chạy độc quyền ở Core 0)
  redis-state-engine:
    image: redis:alpine
    container_name: redis-state
    cpuset: "0"
    restart: always
    command: redis-server --save "" --appendonly no # Tắt hoàn toàn Disk I/O để tối ưu hóa RAM, loại bỏ thắt nút cổ chai ổ cứng
    networks:
      - game-internal-net
